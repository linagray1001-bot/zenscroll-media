<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description"
        content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    {{ with .Params.image }}
    <meta property="og:image" content="{{ . }}">{{ end }}
    <meta name="twitter:card" content="summary_large_image">
    {{ if .IsPage }}
    <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"BlogPosting","headline":"{{ .Title }}","datePublished":"{{ .Date.Format "2006-01-02" }}","author":{"@type":"Person","name":"{{ .Site.Params.author }}"}}
  </script>
    {{ end }}
    <link rel="stylesheet" href="/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="scroll-header">
        <div class="scroll-inner">
            <a href="/" class="scroll-logo">{{ .Site.Title }}</a>
            <nav class="scroll-nav">
                <a href="/">始め</a>
                <a href="/posts/">記事</a>
                <a href="/tags/">分類</a>
            </nav>
        </div>
    </header>
    <main>{{ block "main" . }}{{ end }}</main>
    <footer class="scroll-footer">
        <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
    </footer>
</body>

</html>
