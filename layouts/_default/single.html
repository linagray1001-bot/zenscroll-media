{{ define "main" }}
<article class="ink-single">
    <header>
        <time>{{ .Date.Format "2006年01月02日" }}</time>
        <h1>{{ .Title }}</h1>
        <div class="ink-tags">{{ range .Params.tags }}<span>{{ . }}</span>{{ end }}</div>
    </header>
    {{ with .Params.image }}<img src="{{ . }}" alt="{{ $.Title }}" class="ink-hero-img">{{ end }}
    <div class="ink-content">{{ .Content }}</div>
    <nav class="ink-nav">
        {{ with .PrevInSection }}<a href="{{ .Permalink }}">← {{ .Title }}</a>{{ end }}
        {{ with .NextInSection }}<a href="{{ .Permalink }}">{{ .Title }} →</a>{{ end }}
    </nav>
</article>
{{ end }}
